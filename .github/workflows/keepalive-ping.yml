name: Keepalive Ping

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          HEALTHCHECK_URL_DEFAULT: https://pdftoword-app.onrender.com/healthz
        run: |
          TARGET_URL="$HEALTHCHECK_URL"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="$HEALTHCHECK_URL_DEFAULT"
          fi
          if [ -z "$TARGET_URL" ]; then
            echo "No healthcheck URL configured."
            exit 0
          fi
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "HEALTHCHECK_URL secret not set; using default URL."
          fi
          echo "Pinging $TARGET_URL"
          curl -fsS --max-time 30 "$TARGET_URL"
